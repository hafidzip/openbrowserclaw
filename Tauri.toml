"$schema" = "https://schema.tauri.app/config/2"
productName = "openchad"
version = "0.1.18"
identifier = "com.openchad.app"
[build]
frontendDist = "./frontend"
[app]
withGlobalTauri = true
security.capabilities = ["default"]
[[app.windows]]
title = "openchad"
width = 1680
height = 945

decorations = false

# Overlay-specific settings
# transparent = true
# alwaysOnTop = true
# skipTaskbar = true
# focusable = false       
# shadow = false


maximized = true
[bundle]
icon = [
    "icons/icon.png",
    "icons/icon.ico",
]
