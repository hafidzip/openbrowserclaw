name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }} - ${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            arch: x64
            uv_zip: uv-x86_64-pc-windows-msvc.zip
          - os: windows-11-arm
            arch: arm64
            uv_zip: uv-aarch64-pc-windows-msvc.zip
          - os: macos-latest
            arch: arm64
            uv_zip: uv-aarch64-apple-darwin.tar.gz
          - os: ubuntu-24.04
            arch: x64
            uv_zip: uv-x86_64-unknown-linux-musl.tar.gz
            deb_arch: amd64
          - os: ubuntu-24.04-arm
            arch: arm64
            uv_zip: uv-aarch64-unknown-linux-musl.tar.gz
            deb_arch: arm64
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup uv (build tooling)
        uses: astral-sh/setup-uv@v8.3.0
        with:
          python-version: '3.13'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install OpenSSL (Windows ARM64)
        if: matrix.os == 'windows-11-arm'
        shell: pwsh
        run: |
          $vcpkgPath = if ($env:VCPKG_INSTALLATION_ROOT) { $env:VCPKG_INSTALLATION_ROOT } else { "C:\vcpkg" }
          & "$vcpkgPath\vcpkg.exe" install openssl:arm64-windows-static-md
          "VCPKG_ROOT=$vcpkgPath" | Out-File -FilePath $env:GITHUB_ENV -Append
          "VCPKGRS_TRIPLET=arm64-windows-static-md" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install Linux system build dependencies
        if: matrix.os == 'ubuntu-24.04' || matrix.os == 'ubuntu-24.04-arm'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf libfuse2t64 file

      - name: Build openchad-webview wheel
        run: uv build --wheel --python 3.13 ./openchad-webview

      - name: Update openchad-webview wheel path in openchadpy/pyproject.toml
        shell: python
        run: |
          import glob, re
          wheels = glob.glob("openchad-webview/dist/*.whl")
          if not wheels:
              raise FileNotFoundError("No compiled wheel found in openchad-webview/dist/")
          wheel_path = wheels[0].replace('\\', '/')
          
          # Path relative to openchadpy/
          rel_wheel_path = "../" + wheel_path
          print(f"Dynamically referencing compiled wheel: {rel_wheel_path}")
          
          pyproject = "openchadpy/pyproject.toml"
          with open(pyproject, "r", encoding="utf-8") as f:
              content = f.read()
              
          pattern = r"openchad-webview\s*=\s*\{\s*path\s*=\s*'[^\']+'\s*\}"
          replacement = f"openchad-webview = {{ path = '{rel_wheel_path}' }}"
          new_content, count = re.subn(pattern, replacement, content)
          
          if count == 0:
              raise ValueError("Could not find openchad-webview source definition in openchadpy/pyproject.toml")
              
          with open(pyproject, "w", encoding="utf-8") as f:
              f.write(new_content)
          print("Successfully updated pyproject.toml!")

      # launcher.py hardcodes: uv_path = base_path / "python" / "uv[.exe]"
      # so we must ship a standalone uv binary inside ./python/
      - name: Download standalone uv binary into ./python/ (Windows)
        if: startsWith(matrix.os, 'windows')
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path python | Out-Null
          $zipName = "${{ matrix.uv_zip }}"
          Invoke-WebRequest "https://github.com/astral-sh/uv/releases/latest/download/$zipName" -OutFile uv-win.zip
          Expand-Archive uv-win.zip -DestinationPath uv-win-tmp -Force
          Get-ChildItem -Path uv-win-tmp -Filter uv.exe -Recurse | Copy-Item -Destination python\uv.exe
          Remove-Item uv-win.zip, uv-win-tmp -Recurse -Force

      - name: Download standalone uv binary into ./python/ (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p python
          curl -LsSf https://github.com/astral-sh/uv/releases/latest/download/uv-aarch64-apple-darwin.tar.gz \
            | tar -xz --strip-components=1 -C python
          chmod +x python/uv

      - name: Download standalone uv binary into ./python/ (Linux)
        if: matrix.os == 'ubuntu-24.04' || matrix.os == 'ubuntu-24.04-arm'
        run: |
          mkdir -p python
          curl -LsSf "https://github.com/astral-sh/uv/releases/latest/download/${{ matrix.uv_zip }}" \
            | tar -xz --strip-components=1 -C python
          chmod +x python/uv

      - name: Install Node dependencies
        run: |
          npm ci
          npm install --prefix openchad-react
          npm install --prefix monaco

      - name: Generate icon.icns from icon.png (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p icon.iconset
          sips -z 16   16   icons/icon.png --out icon.iconset/icon_16x16.png
          sips -z 32   32   icons/icon.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32   32   icons/icon.png --out icon.iconset/icon_32x32.png
          sips -z 64   64   icons/icon.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128  128  icons/icon.png --out icon.iconset/icon_128x128.png
          sips -z 256  256  icons/icon.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256  256  icons/icon.png --out icon.iconset/icon_256x256.png
          sips -z 512  512  icons/icon.png --out icon.iconset/icon_256x256@2x.png
          sips -z 512  512  icons/icon.png --out icon.iconset/icon_512x512.png
          sips -z 1024 1024 icons/icon.png --out icon.iconset/icon_512x512@2x.png
          iconutil -c icns icon.iconset -o icon.icns

      - name: Build
        run: npm run build

      # ─────────────────────────────────────────────────────────────────────────
      # Windows — NSIS installer + ZIP
      # ─────────────────────────────────────────────────────────────────────────
      - name: Install NSIS (Windows)
        if: startsWith(matrix.os, 'windows')
        run: choco install nsis -y

      # NSIS has no native ARM64 codegen — the setup.exe will be an x86 stub
      # running under Windows 11's built-in x86 emulation, unpacking native
      # aarch64 payload from Release/. This is normal and expected.
      - name: Build NSIS installer (Windows)
        if: startsWith(matrix.os, 'windows')
        shell: pwsh
        env:
          TAG: ${{ github.ref_name }}
        run: |
          # choco install doesn't refresh the current session's PATH, so add it explicitly
          $env:PATH = "C:\Program Files (x86)\NSIS;$env:PATH"
          $version = $env:TAG -replace '^v', ''
          makensis /DAPP_VERSION=$version /DAPP_ARCH=${{ matrix.arch }} scripts/installer.nsi

      - name: Zip Release contents (Windows)
        if: startsWith(matrix.os, 'windows')
        shell: pwsh
        env:
          TAG: ${{ github.ref_name }}
        run: |
          # Zip the *contents* of Release/, not the folder itself
          Compress-Archive -Path "Release\*" -DestinationPath "OpenBrowser-$env:TAG-windows-${{ matrix.arch }}.zip"

      # ─────────────────────────────────────────────────────────────────────────
      # macOS — DMG + ZIP
      # ─────────────────────────────────────────────────────────────────────────
      - name: Install create-dmg (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install create-dmg

      - name: Build DMG (macOS)
        if: matrix.os == 'macos-latest'
        env:
          TAG: ${{ github.ref_name }}
        run: |
          # This is a portable folder app (not a .app bundle), so we wrap
          # Release/ into an OpenBrowser folder for a clean DMG layout.
          # No --app-drop-link since there is no .app to drag to Applications.
          mkdir dmg-source
          cp -r Release dmg-source/OpenBrowser
          create-dmg \
            --volname "OpenBrowser" \
            --window-size 600 400 \
            --icon-size 100 \
            "OpenBrowser-${TAG}-macos-${{ matrix.arch }}.dmg" \
            dmg-source/

      - name: Zip Release contents (macOS)
        if: matrix.os == 'macos-latest'
        env:
          TAG: ${{ github.ref_name }}
        run: |
          # Zip the *contents* of Release/, not the folder itself
          cd Release && zip -r "../OpenBrowser-${TAG}-macos-${{ matrix.arch }}.zip" . && cd ..

      # ─────────────────────────────────────────────────────────────────────────
      # Linux — .deb + ZIP
      # ─────────────────────────────────────────────────────────────────────────
      - name: Build .deb package (Linux)
        if: matrix.os == 'ubuntu-24.04' || matrix.os == 'ubuntu-24.04-arm'
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION=${TAG#v}
          PKG="openbrowser_${VERSION}_${{ matrix.deb_arch }}"

          # --- deb directory tree ---
          mkdir -p "${PKG}/DEBIAN"
          mkdir -p "${PKG}/opt/openbrowser"
          mkdir -p "${PKG}/usr/share/applications"
          mkdir -p "${PKG}/usr/share/icons/hicolor/256x256/apps"

          # Copy Release/ contents into /opt/openbrowser
          cp -r Release/. "${PKG}/opt/openbrowser/"
          chmod +x "${PKG}/opt/openbrowser/OpenBrowser" 2>/dev/null || true

          # Desktop entry
          cat > "${PKG}/usr/share/applications/openbrowser.desktop" <<'EOF'
          [Desktop Entry]
          Name=OpenBrowser
          Exec=/opt/openbrowser/OpenBrowser
          Icon=openbrowser
          Type=Application
          Categories=Network;WebBrowser;
          EOF

          # Icon
          if [ -f icons/icon.png ]; then
            cp icons/icon.png "${PKG}/usr/share/icons/hicolor/256x256/apps/openbrowser.png"
          fi

          # DEBIAN/control
          cat > "${PKG}/DEBIAN/control" <<EOF
          Package: openbrowser
          Version: ${VERSION}
          Architecture: ${{ matrix.deb_arch }}
          Maintainer: OpenBrowser <noreply@openbrowser.app>
          Description: OpenBrowser — AI-driven browser built with OpenChad
          EOF

          # Build the .deb
          dpkg-deb --build "${PKG}" "OpenBrowser-${TAG}-linux-${{ matrix.arch }}.deb"

      - name: Zip Release contents (Linux)
        if: matrix.os == 'ubuntu-24.04' || matrix.os == 'ubuntu-24.04-arm'
        env:
          TAG: ${{ github.ref_name }}
        run: |
          # Zip the *contents* of Release/, not the folder itself
          cd Release && zip -r "../OpenBrowser-${TAG}-linux-${{ matrix.arch }}.zip" . && cd ..

      # ─────────────────────────────────────────────────────────────────────────
      # Upload all built artifacts
      # ─────────────────────────────────────────────────────────────────────────
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: installers-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            OpenBrowser-*-windows-*-setup.exe
            OpenBrowser-*-windows-*.zip
            OpenBrowser-*-macos-*.dmg
            OpenBrowser-*-macos-*.zip
            OpenBrowser-*-linux-*.deb
            OpenBrowser-*-linux-*.zip
          if-no-files-found: ignore

  # ───────────────────────────────────────────────────────────────────────────
  # Create GitHub Release and attach all 10 artifacts
  # ───────────────────────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/OpenBrowser-*-windows-*-setup.exe
            dist/OpenBrowser-*-windows-*.zip
            dist/OpenBrowser-*-macos-*.dmg
            dist/OpenBrowser-*-macos-*.zip
            dist/OpenBrowser-*-linux-*.deb
            dist/OpenBrowser-*-linux-*.zip